<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Takeout Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.min.css">
  <style>
    :root { --bg:#fff; --fg:#1a1a1a; --muted:#777; --line:#e6e6e6; --accent:#2e86ab; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--fg); background:var(--bg); }
    header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; }
    header h1 { font-size:15px; font-weight:600; margin:0; }
    header .hint { color:var(--muted); font-size:12px; }
    .pick { display:inline-block; padding:6px 12px; border:1px solid var(--accent); color:var(--accent); border-radius:6px; cursor:pointer; font-size:13px; }
    .pick input { display:none; }
    main { display:flex; height:calc(100vh - 51px); }
    aside { width:280px; border-right:1px solid var(--line); overflow:auto; padding:8px 0; }
    .group { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); padding:10px 14px 4px; }
    .row { display:flex; align-items:center; gap:8px; padding:3px 14px; cursor:pointer; }
    .row:hover { background:#f6f8fa; }
    .row .meta { font-size:12px; color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    section { flex:1; display:flex; flex-direction:column; min-width:0; }
    #status { padding:6px 14px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line); min-height:29px; }
    #chart { flex:1; padding:8px; }
    .empty { color:var(--muted); padding:40px; text-align:center; }
  </style>
</head>
<body>
  <header>
    <h1>Google Takeout Viewer</h1>
    <label class="pick">Choose Takeout folder<input type="file" id="folder" webkitdirectory multiple></label>
    <span class="hint">health data — heart rate, speed, and more</span>
  </header>
  <main>
    <aside><div id="list"><div class="empty">Pick your extracted Takeout folder to begin.</div></div></aside>
    <section>
      <div id="status"></div>
      <div id="chart"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.iife.min.js"></script>
  <script type="module" src="./ui/app.js"></script>
</body>
</html>
